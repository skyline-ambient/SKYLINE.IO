<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLINE.IO - Universal Climate Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            overflow-x: hidden;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            position: relative;
        }

        /* Akıllı ve Ferah Premium Hava Temaları */
        body.sunny { background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 40%, #bae6fd 100%); color: #1e293b; }
        body.cloudy { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%); color: #334155; }
        body.rainy { background: linear-gradient(135deg, #334155 0%, #475569 50%, #1e293b 100%); color: #ffffff; }
        body.snowy { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 60%, #cbd5e1 100%); color: #334155; }

        /* Premium Canlı Akış Parçacıkları */
        .weather-effects { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-30px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) translateX(60px) rotate(360deg); opacity: 0; }
        }

        /* iOS 15+ / Android 15 Ultra-Glassmorphism Arayüzü */
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.45); 
            padding: 30px; 
            border-radius: 36px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.06), inset 0 1px 1px rgba(255,255,255,0.5); 
            z-index: 10;
        }
        
        body.rainy .app-container { background: rgba(15, 23, 42, 0.45); border-color: rgba(255,255,255,0.15); color: #fff; }

        .search-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: rgba(255,255,255,0.55); border: 1px solid rgba(0,0,0,0.05); padding: 14px; color: inherit; border-radius: 18px; outline: none; font-size: 15px; font-weight: 600; }
        input::placeholder { color: currentColor; opacity: 0.6; }
        button { background: #0a84ff; color: #fff; border: none; padding: 14px 20px; border-radius: 18px; font-weight: 700; cursor: pointer; font-size: 15px; box-shadow: 0 4px 15px rgba(10,132,255,0.2); }
        button.add-fav { background: #34c759; box-shadow: 0 4px 15px rgba(52,199,89,0.2); }
        
        .fav-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; min-height: 40px; }
        .fav-bar::-webkit-scrollbar { display: none; }
        .fav-chip { background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.3); padding: 8px 14px; border-radius: 24px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
        .fav-chip .del-btn { color: #ff3b30; font-weight: bold; margin-left: 6px; }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .location { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .date { font-size: 13px; opacity: 0.7; font-weight: 600; text-transform: uppercase; }
        .action-btns { display: flex; gap: 10px; }
        .icon-btn { background: rgba(0,0,0,0.04); border: none; color: inherit; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        
        .care-bubble {
            background: rgba(255, 255, 255, 0.7);
            border-left: 5px solid #0a84ff;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 22px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }

        .settings-panel { display: none; background: rgba(255,255,255,0.9); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 700; }
        select, .toggle-btn { background: rgba(0,0,0,0.05); color: inherit; border: none; padding: 8px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }

        /* Kanlı Canlı Modern İkon Alanı */
        .main-display { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .weather-visual-box { width: 100px; height: 100px; margin: 0 auto 10px; position: relative; display: flex; justify-content: center; align-items: center; }
        
        /* Modern Katmanlı Vektörel Hava Efektleri (İlkel emojiler yerine) */
        .vector-sun { width: 60px; height: 60px; background: radial-gradient(circle, #ffea00 0%, #ff9100 100%); border-radius: 50%; box-shadow: 0 0 30px #ffaa00; animation: rotateSun 12s linear infinite; }
        .vector-cloud { width: 70px; height: 40px; background: rgba(241, 245, 249, 0.9); border-radius: 20px; position: absolute; bottom: 10px; right: 10px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); animation: floatCloud 4s ease-in-out infinite; }
        .vector-cloud::before { content:''; width: 40px; height: 40px; background: rgba(241, 245, 249, 0.9); border-radius: 50%; position: absolute; top: -20px; left: 10px; }
        .vector-cloud::after { content:''; width: 30px; height: 30px; background: rgba(241, 245, 249, 0.9); border-radius: 50%; position: absolute; top: -15px; right: 15px; }
        
        @keyframes rotateSun { 100% { transform: rotate(360deg); } }
        @keyframes floatCloud { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .main-temp { font-size: 76px; font-weight: 200; line-height: 1; margin: 5px 0; letter-spacing: -2px; }
        .condition { font-size: 15px; opacity: 0.8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-card { background: rgba(255,255,255,0.4); padding: 16px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.25); }
        .stat-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; margin-bottom: 4px; font-weight: 800; }
        .stat-value { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        
        /* Canlı Rüzgar Oku */
        .wind-arrow { display: inline-block; font-size: 16px; transform: rotate(0deg); transition: transform 1s ease; color: #0a84ff; }

        .section-title { font-size: 13px; font-weight: 700; opacity: 0.6; text-transform: uppercase; margin: 18px 0 12px 0; }
        .hourly-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
        .hourly-item { background: rgba(255,255,255,0.4); padding: 12px; border-radius: 18px; min-width: 68px; text-align: center; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.15); }
        .hourly-item div { font-weight: 700; font-size: 13px; }
    </style>
</head>
<body class="sunny">

    <div class="weather-effects" id="weatherEffects"></div>

    <div class="app-container">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Search village, town...">
            <button onclick="searchLocation()">🔍</button>
            <button class="add-fav" onclick="addCurrentToFavorites()">＋</button>
        </div>

        <div class="fav-bar" id="favBar"></div>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row"><span>Temperature Unit</span><button class="toggle-btn" id="btnTempUnit" onclick="toggleTempUnit()">°C</button></div>
            <div class="setting-row"><span>Wind Unit</span><button class="toggle-btn" id="btnWindUnit" onclick="toggleWindUnit()">km/h</button></div>
            <div class="setting-row"><span>Language</span>
                <select id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="zh">中文</option>
                    <option value="es">Español</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>

        <div class="header">
            <div>
                <div class="location" id="locName">Istanbul</div>
                <div class="date" id="liveDate">--</div>
            </div>
            <div class="action-btns">
                <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
                <button class="icon-btn" onclick="syncEcosystem()">⟳</button>
            </div>
        </div>

        <div class="care-bubble" id="careBubble">✨ Connecting to your heart...</div>

        <div class="main-display">
            <!-- Modern Vektörel Görsel Katmanı -->
            <div class="weather-visual-box">
                <div class="vector-sun" id="vSun"></div>
                <div class="vector-cloud" id="vCloud"></div>
            </div>
            <div class="main-temp" id="mainTemp">--</div>
            <div class="condition" id="mainDesc">Ferah Atmosfer</div>
        </div>

        <div class="grid-stats">
            <div class="stat-card">
                <div class="stat-label" id="lblWind">Wind Vector</div>
                <div class="stat-value"><span class="wind-arrow" id="windArrow">➔</span> <span id="statWind">--</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="lblPollen">Pollen Index</div>
                <div class="stat-value" id="statPollen">Good (15/500)</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="lblHumid">Humidity</div>
                <div class="stat-value" id="statHumid">--%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="lblUV">UV Index</div>
                <div class="stat-value" id="statUV">Low (1/11)</div>
            </div>
        </div>

        <div class="section-title" id="lblHourly">Hourly Timeline</div>
        <div class="hourly-scroll" id="hourlyContainer"></div>
    </div>

    <script>
        let lastCoords = JSON.parse(localStorage.getItem('skyline_last_coords')) || { lat: 41.0082, lon: 28.9784, name: "Istanbul" };
        let currentCoords = { ...lastCoords };
        let favorites = JSON.parse(localStorage.getItem('skyline_favs')) || [];
        let config = { temp: 'C', wind: 'kmh', lang: 'en' };

        const translations = {
            en: { search: "Search village, town...", wind: "Wind Vector", pollen: "Pollen Index", humid: "Humidity", uv: "UV Index", hourly: "Hourly Timeline", err: "Location not found" },
            tr: { search: "Köy, ilçe, kasaba ara...", wind: "Rüzgar Hızı", pollen: "Polen Endeksi", humid: "Nem Oranı", uv: "UV İndeksi", hourly: "Saatlik Tahmin", err: "Konum bulunamadı" }
        };

        const careMessages = {
            en: {
                sunny: "You look absolutely gorgeous today! 🌟 Remember, even if the world gets busy, you are doing amazing. Take a breath and let your light shine! ☀️",
                cloudy: "A perfect day to slow down and protect your peace. Don't let today's workload stress you—you are far more important than any task. Coffee time? ☕🍃",
                rainy: "The sky is washing away yesterday's fatigue. Keep your heart warm, grab your umbrella, and remember: after every rain, you shine brighter! 🌧️💖",
                snowy: "A magical, pristine day! The world is quiet so you can find your inner peace. Dress in your coziest clothes, stay warm, and smile! ❄️✨",
                uvHigh: "The sun is super powerful right now—just like your potential! Protect those beautiful eyes and find some cool shade, okay? 🕶️"
            },
            tr: {
                sunny: "Bugün harika görünüyorsun! 🌟 Unutma, hayat ne kadar yoğun olursa olsun çok iyi gidiyorsun. Derin bir nefes al ve parlamaya devam et! ☀️",
                cloudy: "Zihnini dinlendirmek ve huzurunu korumak için harika bir gün. İş yorgunluğunun seni strese sokmasına izin verme, sen her şeyden önemlisin. Bi' kahve? ☕🍃",
                rainy: "Gökyüzü bugünün tüm yorgunluğunu temizliyor. İçini sıcacık tut, şemsiyeni unutma ve hatırla: Her yağmurdan sonra daha güçlü parlayacaksın! 🌧️💖",
                snowy: "Büyüleyici, tertemiz bir gün! Hayatın stresini bir kenara bırakıp bu beyaz masalın tadını çıkar. En sıcak giysilerini seç ve gülümse! ❄️✨",
                uvHigh: "Güneş bugün tıpkı senin enerjin gibi çok güçlü! O güzel gözlerini koru ve kendine nazik davranıp biraz gölgede kal olur mu? 🕶️"
            }
        };

        window.onload = function() {
            const browserLang = navigator.language.split('-');
            if (translations[browserLang]) config.lang = browserLang;
            document.getElementById('langSelect').value = config.lang;
            
            changeLanguage(config.lang);
            renderFavorites();
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
            setTimeout(syncEcosystem, 1000);
        };

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function changeLanguage(lang) {
            config.lang = lang;
            document.getElementById('searchInput').placeholder = translations[lang].search;
            document.getElementById('lblWind').innerText = translations[lang].wind;
            document.getElementById('lblPollen').innerText = translations[lang].pollen;
            document.getElementById('lblHumid').innerText = translations[lang].humid;
            document.getElementById('lblUV').innerText = translations[lang].uv;
            document.getElementById('lblHourly').innerText = translations[lang].hourly;
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        function toggleTempUnit() {
            config.temp = config.temp === 'C' ? 'F' : 'C';
            document.getElementById('btnTempUnit').innerText = '°' + config.temp;
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        function toggleWindUnit() {
            config.wind = config.wind === 'kmh' ? 'mph' : 'kmh';
            document.getElementById('btnWindUnit').innerText = config.wind === 'kmh' ? 'km/h' : 'mph';
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        async function searchLocation() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            try {
                const res = await fetch(`https://open-meteo.com{encodeURIComponent(query)}&count=1&format=json`);
                const data = await res.json();
                if(!data || !data.results || data.results.length === 0) { alert(translations[config.lang].err); return; }
                const target = data.results[0];
                currentCoords = { lat: target.latitude, lon: target.longitude, name: target.name };
                localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
                fetchWeatherData(target.latitude, target.longitude, target.name);
            } catch(e) { alert("Network Error"); }
        }

        async function fetchWeatherData(lat, lon, name) {
            const tUnit = config.temp === 'F' ? 'fahrenheit' : 'celsius';
            const wUnit = config.wind === 'mph' ? 'mph' : 'kmh';
            
            // Sabit ve Güvenli Küresel Rota (Tüm tarayıcı kilitleri kırıldı)
            const url = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,uv_index,birch_pollen&temperature_unit=${tUnit}&wind_speed_unit=${wUnit}&timezone=auto`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(!data || !data.current) return;
                
                document.getElementById('locName').innerText = name;
                document.getElementById('liveDate').innerText = new Date().toLocaleDateString(config.lang, { weekday: 'short', month: 'short', day: 'numeric' });
                document.getElementById('mainTemp').innerText = `${Math.round(data.current.temperature_2m)}°${config.temp}`;
                
                const wSpeed = data.current.wind_speed_10m;
                const wUnitLabel = config.wind === 'kmh' ? 'km/h' : 'mph';
                document.getElementById('statWind').innerText = `${wSpeed} ${wUnitLabel}`;
                
                // Canlı Rüzgar Yönü Oku (Açıya Göre Döner)
                const wDir = data.current.wind_direction_10m;
                document.getElementById('windArrow').style.transform = `rotate(${wDir}deg)`;

                document.getElementById('statHumid').innerText = `${data.current.relative_humidity_2m}%`;
                
                // Bilimsel Referans Hesaplama Motoru
                const currentUV = data.hourly.uv_index ? Math.round(data.hourly.uv_index[0]) : 1;
                document.getElementById('statUV').innerText = `${currentUV} / 11 (Max Risk)`;

                const pollenValue = data.hourly.birch_pollen ? Math.round(data.hourly.birch_pollen[0]) : 12;
                document.getElementById('statPollen').innerText = `${pollenValue} / 500 m³`;

                updateAmbientTheme(data.current.weather_code, currentUV);
                
                const hourlyCont = document.getElementById('hourlyContainer');
                hourlyCont.innerHTML = '';
                for(let i=0; i<8; i++) {
                    hourlyCont.innerHTML += `<div class="hourly-item"><div>+${i+1}h</div><div><b>${Math.round(data.hourly.temperature_2m[i])}°</b></div></div>`;
                }
            } catch(e) { console.log(e); }
        }

        function updateAmbientTheme(code, uv) {
            const body = document.body;
            const sunV = document.getElementById('vSun');
            const cloudV = document.getElementById('vCloud');
            const desc = document.getElementById('mainDesc');
            const bubble = document.getElementById('careBubble');
            const effects = document.getElementById('weatherEffects');
            effects.innerHTML = '';

            const lang = careMessages[config.lang] ? config.lang : 'en';

            if (code <= 2) { // Güneşli / Açık
                body.className = 'sunny';
                sunV.style.display = 'block';
                cloudV.style.display = 'none';
                desc.innerText = config.lang === 'tr' ? 'GÜNEŞLİ VE FERAH' : 'SUNNY & FRESH';
                bubble.innerText = careMessages[lang].sunny;
            } else if (code >= 3 && code <= 48) { // Bulutlu / Sisli
                body.className = 'cloudy';
                sunV.style.display = 'block';
                cloudV.style.display = 'block';
                desc.innerText = config.lang === 'tr' ? 'HUZURLU BULUTLU' : 'PEACEFUL CLOUDY';
                bubble.innerText = careMessages[lang].cloudy;
                createParticles(10, '🍃', '14px');
            } else if (code >= 51 && code <= 67) { // Yağmurlu
                body.className = 'rainy';
                sunV.style.display = 'none';
                cloudV.style.display = 'block';
                desc.innerText = config.lang === 'tr' ? 'BEREKETLİ YAĞMUR' : 'REFRESHING RAIN';
                bubble.innerText = careMessages[lang].rainy;
                createParticles(40, '🌧️', '2px');
            } else { // Karlı / Diğer
                body.className = 'snowy';
                sunV.style.display = 'none';
                cloudV.style.display = 'block';
                desc.innerText = config.lang === 'tr' ? 'BEYAZ ÖRTÜ / KARLI' : 'WHITE SNOWFLAKES';
                bubble.innerText = careMessages[lang].snowy;
                createParticles(25, '❄️', '14px');
            }
        }

        function createParticles(count, symbol, width) {
            const effects = document.getElementById('weatherEffects');
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = symbol === '🌧️' ? '' : symbol;
                if(symbol === '🌧️') {
                    p.style.width = width;
                    p.style.height = '18px';
                    p.style.background = 'rgba(0,122,255,0.4)';
                } else {
                    p.style.background = 'transparent';
                    p.style.fontSize = width;
                }
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                p.style.animationDelay = Math.random() * 3 + 's';
                effects.appendChild(p);
            }
        }

        function addCurrentToFavorites() {
            if(favorites.length >= 7) favorites.shift();
            if(!favorites.some(f => f.name === currentCoords.name)) {
                favorites.push({ ...currentCoords });
                localStorage.setItem('skyline_favs', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        function removeFavorite(index, event) {
            event.stopPropagation();
            favorites.splice(index, 1);
            localStorage.setItem('skyline_favs', JSON.stringify(favorites));
            renderFavorites();
        }

        function renderFavorites() {
            const bar = document.getElementById('favBar');
            bar.innerHTML = '';
            favorites.forEach((fav, idx) => {
                bar.innerHTML += `
                    <div class="fav-chip" onclick="loadFavorite(${idx})">
                        📍 ${fav.name} <span class="del-btn" onclick="removeFavorite(${idx}, event)">×</span>
                    </div>`;
            });
        }

        function loadFavorite(idx) {
            const fav = favorites[idx];
            currentCoords = { ...fav };
            localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
            fetchWeatherData(fav.lat, fav.lon, fav.name);
        }

        function syncEcosystem() {
            navigator.geolocation.getCurrentPosition((pos) => {
                currentCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude, name: "Current Location" };
                localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
                fetchWeatherData(pos.coords.latitude, pos.coords.longitude, "Current Location");
            }, () => {
                fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
            });
        }
    </script>
</body>
</html>
